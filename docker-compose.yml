x-app-environment: &app-environment
  APP_NAME: ${APP_NAME}
  APP_ENV: ${APP_ENV}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG}
  APP_URL: ${APP_URL}
  APP_PORT: ${APP_PORT}
  DB_CONNECTION: ${DB_CONNECTION}
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DB_FORWARD_PORT: ${DB_FORWARD_PORT}
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
  CACHE_STORE: ${CACHE_STORE}
  SESSION_DRIVER: ${SESSION_DRIVER}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION}
  VITE_PORT: ${VITE_PORT}
  VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL}

services:
  env-check:
    build:
      context: .
      dockerfile: Dockerfile
      target: node-deps
    container_name: banhang_env_check
    restart: "no"
    environment: *app-environment
    command: npm run validate:env

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: banhang_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment: *app-environment
    ports:
      - "${APP_PORT}:80"
    command:
      - sh
      - -c
      - |
        if [ "$$APP_ENV" != "production" ] && [ -z "$$APP_KEY" ]; then
          export APP_KEY="base64:$$(php -r 'echo base64_encode(random_bytes(32));')";
        fi
        apache2-foreground
    depends_on:
      env-check:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: banhang_mysql
    restart: unless-stopped
    ports:
      - "${DB_FORWARD_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      env-check:
        condition: service_completed_successfully

  vite:
    image: node:22.12.0-bookworm
    container_name: banhang_vite
    profiles:
      - dev
    restart: unless-stopped
    working_dir: /var/www/html
    environment: *app-environment
    command: sh -c "npm ci && npm run validate:env && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT}:5173"
    volumes:
      - .:/var/www/html
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      env-check:
        condition: service_completed_successfully
      app:
        condition: service_started

volumes:
  mysql_data:
  node_modules_data:
