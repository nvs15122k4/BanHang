services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banhang_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_NAME: ${APP_NAME:-BanHang}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-banhang}
      DB_USERNAME: ${DB_USERNAME:-banhang}
      DB_PASSWORD: ${DB_PASSWORD:-banhang}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-http://localhost:5173}
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    command:
      - sh
      - -c
      - |
        if [ -z "$$APP_KEY" ]; then
          export APP_KEY="base64:$$(php -r 'echo base64_encode(random_bytes(32));')";
        fi
        php-fpm
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: banhang_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - vendor_data:/var/www/html/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: banhang_mysql
    restart: unless-stopped
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-banhang}
      MYSQL_USER: ${DB_USERNAME:-banhang}
      MYSQL_PASSWORD: ${DB_PASSWORD:-banhang}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  vite:
    image: node:22-bookworm
    container_name: banhang_vite
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      - app

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
